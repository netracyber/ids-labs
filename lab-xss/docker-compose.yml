services:
  # Lab 1: Reflected XSS Lab
  reflected-xss-lab:
    build: .
    container_name: xss-lab-reflected
    ports:
      - "8020:80"
    volumes:
      - ./reflected_xss_lab:/var/www/html
      - ./reflected_xss_lab/tools/generate_flag.py:/usr/local/bin/generate_flag.py:ro
    command: >
      sh -c "php -S 0.0.0.0:80 -t /var/www/html /var/www/html/reflected_router.php"
    networks:
      - tracking-network
    extra_hosts:
      - "tracking-service:host-gateway"

  # Lab 2: Stored XSS Lab
  stored-xss-lab:

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SecureShop - Search Products</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f5f5f5;
            color: #333;
        }
        .header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
        }
        .nav {
            background-color: #34495e;
            padding: 10px;
            text-align: center;
        }
        .nav a {
            color: white;
            text-decoration: none;
            padding: 10px 15px;
            display: inline-block;
        }
        .nav a:hover {
            background-color: #2c3e50;
        }
        .container {
            max-width: 1000px;
            margin: 20px auto;
            padding: 20px;
            background-color: white;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        .search-box {
            margin: 20px 0;
            text-align: center;
        }
        input[type="text"] {
            padding: 10px;
            width: 300px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 10px 20px;
            background-color: #3498db;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #2980b9;
        }
        .results {
            margin-top: 20px;
        }
        .search-results-header {
            font-size: 18px;
            margin-bottom: 15px;
            color: #2c3e50;
        }
        .product {
            margin: 15px 0;
            padding: 15px;
            border: 1px solid #eee;
            border-radius: 5px;
            background-color: #f9f9f9;
        }
        .footer {
            text-align: center;
            padding: 20px;
            background-color: #ecf0f1;
            color: #7f8c8d;
            margin-top: 30px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>SecureShop</h1>
        <p>Find the best deals on electronics, clothing, and more</p>
    </div>
    
    <div class="nav">
        <a href="#">Home</a>
        <a href="#">Categories</a>
        <a href="#">Deals</a>
        <a href="#">Contact</a>
    </div>
    
    <div class="container">
        <div class="search-box">
            <form id="searchForm" action="search.php" method="GET">
                <input type="text" name="search" id="searchInput" placeholder="Search products..." value="">
                <button type="submit">Search</button>
            </form>
        </div>

        <div id="results" class="results">
            <div class="search-results-header" id="searchHeader">Search for products to get started</div>
            <div id="searchResults"></div>
        </div>
    </div>
    
    <div class="footer">
        <p>&copy; 2026 SecureShop. All rights reserved.</p>
    </div>

    <script>
        // Get search query from URL parameters
        const urlParams = new URLSearchParams(window.location.search);
        const searchQuery = urlParams.get('search');
        
        if (searchQuery) {
            // Update the search input field with the query
            document.getElementById('searchInput').value = searchQuery;
            
            // Update the search header with the query
            document.getElementById('searchHeader').textContent = 'Search Results for: ' + searchQuery;
            
            // VULNERABLE CODE: The search query is reflected in a JavaScript string
            // This creates a reflected XSS vulnerability when the string is not properly escaped
            var trackingData = {
                searchTerm: searchQuery,
                timestamp: new Date().toISOString(),
                userAgent: navigator.userAgent
            };
            
            // Log the search query to the console for tracking purposes
            console.log("Search query logged: " + searchQuery);
        }
    </script>
</body>
</html>

    sub_filter 'href="/' 'href="/lab/8053/';
    sub_filter "href='/" "href='/lab/8053/";
    sub_filter 'action="/' 'action="/lab/8053/';
    sub_filter 'src="/' 'src="/lab/8053/';
    sub_filter "src='/" "src='/lab/8053/";
    sub_filter 'fetch("/' 'fetch("/lab/8053/';
    sub_filter "fetch('/" "fetch('/lab/8053/";
    sub_filter_once off;
    sub_filter_types text/html application/javascript;
    include /data/nginx/custom/lab_proxy.inc;
}


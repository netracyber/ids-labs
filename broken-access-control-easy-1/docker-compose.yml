version: '3.8'
services:
  broken-access-control-easy-1:
    build: .
    container_name: broken-access-control-easy-1
    ports:
      - "8075:80"
    volumes:
      - ./logs:/var/log/apache2
    restart: unless-stopped
    networks:
      - lab-network
      - tracking-network

networks:
  lab-network:
    driver: bridge
  tracking-network:
    external: true
